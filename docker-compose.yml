services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-attendance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attendance_pass}
      POSTGRES_DB: ${POSTGRES_DB:-attendance}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attendance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    command: redis-server --requirepass ${REDIS_PASSWORD:-att3ndanc3_r3dis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-att3ndanc3_r3dis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ────────────────────────────────────────────────────────────
  api:
    build: ./server
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_pass}@postgres:5432/${POSTGRES_DB:-attendance}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-att3ndanc3_r3dis}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@archisysinnovation.com}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-info@archisysinnovation.com}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-admin@attendance.app}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-Admin@123!}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Background Worker ─────────────────────────────────────────────────────
  worker:
    build: ./server
    command: ["node", "src/workers/index.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_pass}@postgres:5432/${POSTGRES_DB:-attendance}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-att3ndanc3_r3dis}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@archisysinnovation.com}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ── Accounting + Billing Microservice ─────────────────────────────────────
  accounting:
    build: ./server
    command: ["node", "src/accounting-service.js"]
    ports:
      - "127.0.0.1:3010:3010"
    environment:
      - PORT=3010
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_pass}@postgres:5432/${POSTGRES_DB:-attendance}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-att3ndanc3_r3dis}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── CRM Microservice ─────────────────────────────────────────────────────
  crm:
    build: ./server
    command: ["node", "src/crm-service.js"]
    ports:
      - "127.0.0.1:3011:3011"
    environment:
      - PORT=3011
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_pass}@postgres:5432/${POSTGRES_DB:-attendance}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-att3ndanc3_r3dis}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Web Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ""
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      api:
        condition: service_healthy
      accounting:
        condition: service_healthy
      crm:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Database Backup (daily at 2 AM) ──────────────────────────────────────
  backup:
    image: postgres:16-alpine
    entrypoint: /bin/sh
    command: >
      -c "
      echo '0 2 * * * /scripts/backup-db.sh >> /var/log/backup.log 2>&1' | crontab - &&
      crond -f -l 2
      "
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-attendance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attendance_pass}
      POSTGRES_DB: ${POSTGRES_DB:-attendance}
      DB_HOST: postgres
      BACKUP_DIR: /backups
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./server/scripts:/scripts:ro
      - backup-data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  app-data:
  backup-data:

networks:
  internal:
    driver: bridge
