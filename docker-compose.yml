version: '3.8'
services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=data/attendance.db
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - NFC_API_KEY=${NFC_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@archisysinnovation.com}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-info@archisysinnovation.com}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
